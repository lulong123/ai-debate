# ============================================================================
# Multi-Model LLM Configuration
# ============================================================================
# 每个条目指定一个 agent 角色（role）使用的模型。
# role 可以是：default, moderator, debater, scorer, data_clerk
# - "default" 是所有未单独配置的角色的回退模型（必须至少有一个）
# - 同一个 role 只有第一个未被注释的条目生效
# - $VAR 语法引用 .env 中的环境变量
#
# 使用方法：
#   1. cp config.example.yaml config.yaml
#   2. 取消注释你想用的模型
#   3. 在 .env 中填入对应的 API key
#
# LiteLLM 支持的完整供应商列表：https://docs.litellm.ai/docs/providers

models:
  # ============================================================================
  # GLM (智谱) — 默认启用
  # ============================================================================
  - role: default
    model: openai/glm-5.1
    api_key: $LLM_API_KEY
    base_url: https://open.bigmodel.cn/api/paas/v4

