services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_MODEL=${LLM_MODEL:-glm-5.1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://open.bigmodel.cn/api/anthropic}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-}
      - ZHIPU_SEARCH_API_KEY=${ZHIPU_SEARCH_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    volumes:
      - roundtable-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  roundtable-data:
